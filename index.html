<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diceware Generator</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="theme-color" content="#E5FF45">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;900&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1014;
      --surface: #1a1b22;
      --accent: #E5FF45; /* Neon yellow/amberish */
      --text: #f0f0f0;
      --text-muted: #8a8d98;
      --border: #2a2b36;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Unbounded', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
      overflow-x: hidden;
    }

    main {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      position: relative;
    }

    header {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 900;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      max-width: 400px;
      line-height: 1.4;
    }

    .display-area {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s ease;
    }

    .display-area:hover {
      border-color: rgba(229, 255, 69, 0.3);
    }

    #password-output {
      font-family: 'IBM Plex Mono', monospace;
      font-size: clamp(1.2rem, 3vw, 2.4rem);
      font-weight: 500;
      color: var(--accent);
      text-align: center;
      word-break: keep-all;
      overflow-wrap: anywhere;
      white-space: normal;
      min-height: 4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.2s;
      width: 100%;
      padding: 0 1rem;
    }

    #password-output:active {
      opacity: 0.5;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
    }

    .controls-row {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .word-count-control {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--bg);
      padding: 0.5rem 1rem;
      border-radius: 100px;
      border: 1px solid var(--border);
    }

    .word-count-control span {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100px;
      background: transparent;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      margin-top: -6px;
    }
    
    input[type="range"]::-webkit-slider-runnable-track {
      width: 100%;
      height: 4px;
      cursor: pointer;
      background: var(--border);
      border-radius: 2px;
    }

    button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 1rem 2.5rem;
      font-family: 'Unbounded', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      border-radius: 100px;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      width: 100%;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(229, 255, 69, 0.2);
    }

    button:active {
      transform: translateY(1px);
    }

    .metrics {
      display: flex;
      gap: 2rem;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }

    .metric {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .metric-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.5rem;
      color: var(--text);
    }

    .metric-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 1rem 2rem;
      border-radius: 100px;
      font-size: 0.9rem;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .separator {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .separator input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: 'IBM Plex Mono', monospace;
      width: 40px;
      text-align: center;
      border-radius: 8px;
      padding: 0.25rem;
    }

    /* Desktop */
    @media (min-width: 640px) {
      body { padding: 2rem; }
      main { gap: 2rem; }
      button { width: auto; }
      .controls { flex-direction: row; flex-wrap: wrap; align-items: center; justify-content: space-between; }
      .controls-row { flex: 1; }
    }

    .mnemonic {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 1rem 0;
    }

    .mnemonic-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      min-width: 48px;
    }

    .mnemonic-emoji {
      font-size: 2rem;
      line-height: 1;
    }

    .mnemonic-word {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-muted);
      text-transform: lowercase;
    }
  </style>
</head>

  <main>
    <header>
      <h1>Entropy<br>Engine</h1>
      <p class="subtitle">Генератор запоминаемых паролей (Diceware). Слова выбираются криптографически надёжным рандомом. Никаких серверов, всё работает прямо в браузере.</p>
    </header>

    <div class="display-area">
      <div id="password-output" title="Нажми, чтобы скопировать">Нажми Generate</div>
      
      <div class="controls">
        <div class="controls-row">
          <div class="word-count-control">
            <span>Слов: <span id="word-count-display">4</span></span>
            <input type="range" id="word-count" min="3" max="8" value="4">
          </div>
          <div class="separator">
            Разделитель
            <input type="text" id="separator-input" value="-" maxlength="3">
          </div>
        </div>

        <label class="strict-mode-toggle" style="display:flex; align-items:center; gap:0.5rem; cursor:pointer; color:var(--text-muted); font-size:0.85rem; user-select:none;">
          <input type="checkbox" id="strict-mode" style="accent-color: var(--accent); width: 16px; height: 16px; cursor:pointer;">
          Для вредных сайтов (A-Z, 0-9, !@#)
        </label>

        <button id="generate-btn">🔄 Сгенерировать</button>
      </div>
    </div>

    <div class="mnemonic" id="mnemonic"></div>

    <div class="metrics">
      <div class="metric">
        <div class="metric-value" id="entropy-value">0</div>
        <div class="metric-label">Бит энтропии</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="time-display">—</div>
        <div class="metric-label">Лет на взлом</div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast">Пароль скопирован!</div>

      horse:'🐴',goat:'🐐',lamb:'🐑',cow:'🐄',pig:'🐷',
      hat:'🎩',shoe:'👟',gown:'👗',vest:'🦺',
      home:'🏠',barn:'🏚️',tower:'🗼',
      coin:'🪙',purse:'👛',prize:'🏆',medal:'🏅',
      paint:'🎨',pen:'✒️',quill:'✒️',
      car:'🚗',bike:'🚲',plane:'✈️',ship:'🚢',
      pill:'💊',herb:'🌿',aloe:'🪴',
      skull:'💀',ghost:'👻',wand:'🪄',tiara:'👸',
      pizza:'🍕',nacho:'🌮',pork:'🥩',
      match:'🔥',candle:'🕯️',torch:'🔦',
    };

    // Fallback emoji set for words without manual mapping
    const fallbackEmoji = ['🔷','🔶','🟢','🟣','🔴','🟡','⭕','💠','🔸','🔹','🟠','🟤','⬛','⬜','🔲','🔳','♦️','♣️','♠️','♥️','🃏','🎯','🎪','🎭','🧩','🔮','🪩','💫','🌀','🎲'];

    function getWordEmoji(word) {
      if (wordEmoji[word]) return wordEmoji[word];
      // Deterministic hash → pick from fallback set
      let hash = 0;
      for (let i = 0; i < word.length; i++) {
        hash = ((hash << 5) - hash) + word.charCodeAt(i);
        hash |= 0;
      }
      return fallbackEmoji[Math.abs(hash) % fallbackEmoji.length];
    }

    // 1296 = 6^4 (10.34 bits of entropy per word)
    const ENTROPY_PER_WORD = 10.34;

    const generateBtn = document.getElementById('generate-btn');
    const passwordOutput = document.getElementById('password-output');
    const wordCountSlider = document.getElementById('word-count');
    const wordCountDisplay = document.getElementById('word-count-display');
    const separatorInput = document.getElementById('separator-input');
    const strictModeCheckbox = document.getElementById('strict-mode');
    const entropyValue = document.getElementById('entropy-value');
    const timeDisplay = document.getElementById('time-display');
    const mnemonicEl = document.getElementById('mnemonic');
    const toast = document.getElementById('toast');

    // Cryptographically secure random number between 0 and max-1
    function getSecureRandomInt(max) {
      const randomBuffer = new Uint32Array(1);
      window.crypto.getRandomValues(randomBuffer);
      return randomBuffer[0] % max;
    }

    function generatePassword() {
      const count = parseInt(wordCountSlider.value);
      const separator = separatorInput.value;
      const selectedWords = [];

      for (let i = 0; i < count; i++) {
        const index = getSecureRandomInt(wordlist.length);
        let word = wordlist[index];
        
        // Capitalize first letter if strict mode is on
        if (strictModeCheckbox.checked) {
          word = word.charAt(0).toUpperCase() + word.slice(1);
        }
        
        selectedWords.push(word);
      }

      let password = selectedWords.join(separator);

      // Add a digit and a special character at the end
      if (strictModeCheckbox.checked) {
        const specials = "!@#$%^&*";
        const randomDigit = getSecureRandomInt(10);
        const randomSpecial = specials[getSecureRandomInt(specials.length)];
        password += `${separator}${randomDigit}${randomSpecial}`;
      }

      passwordOutput.textContent = password;

      // Render emoji mnemonic
      mnemonicEl.innerHTML = selectedWords.map(w => {
        const baseWord = w.toLowerCase();
        const emoji = getWordEmoji(baseWord);
        return `<div class="mnemonic-item"><span class="mnemonic-emoji">${emoji}</span><span class="mnemonic-word">${baseWord}</span></div>`;
      }).join('');

      // Calculate entropy
      // Words: count * log2(1296)
      // Strict mode adds: log2(10) for digit + log2(8) for special
      let entropy = count * ENTROPY_PER_WORD;
      if (strictModeCheckbox.checked) {
        entropy += Math.log2(10) + Math.log2(8); // ~6.3 extra bits
      }
      entropyValue.textContent = Math.round(entropy);

      // Rough estimation of cracking time 
      // Assuming attacker can guess 10^10 passwords per second (10 billion/s)
      // seconds = 2^entropy / 10^10
      // years = seconds / (3600 * 24 * 365)
      const guessesPerSec = 1e10;
      const secondsToCrack = Math.pow(2, entropy) / guessesPerSec;
      const yearsToCrack = secondsToCrack / (3600 * 24 * 365);
      
      // Calculate power of 10 for display
      const log10Years = Math.log10(yearsToCrack);
      
      if (log10Years < 0) {
        timeDisplay.textContent = '< 1 года';
      } else {
        timeDisplay.innerHTML = `~10<sup>${Math.round(log10Years)}</sup>`;
      }
    }

    wordCountSlider.addEventListener('input', (e) => {
      wordCountDisplay.textContent = e.target.value;
      generatePassword();
    });

    generateBtn.addEventListener('click', generatePassword);

    strictModeCheckbox.addEventListener('change', generatePassword);
    separatorInput.addEventListener('input', generatePassword);

    passwordOutput.addEventListener('click', async () => {
      const text = passwordOutput.textContent;
      if (text === 'Нажми Generate') return;
      
      try {
        await navigator.clipboard.writeText(text);
        showToast();
      } catch (err) {
        console.error('Failed to copy', err);
      }
    });

    function showToast() {
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    // Generate on first load
    generatePassword();

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then((registration) => {
          console.log('ServiceWorker registered:', registration.scope);
        }).catch((error) => {
          console.error('ServiceWorker registration failed:', error);
        });
      });
    }
  </script>
</body>
</html>
